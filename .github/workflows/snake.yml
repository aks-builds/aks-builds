name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # runs every 12 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: aks-builds
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=%2322c55e&color_dots[0]=%230d0d0d&color_dots[1]=%2314532d&color_dots[2]=%23166534&color_dots[3]=%2315803d&color_dots[4]=%2322c55e&color_empty=%230a0a0a&color_bg=%230a0a0a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
