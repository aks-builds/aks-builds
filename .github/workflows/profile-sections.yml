name: Regenerate terminal SVG

# Keeps the dynamic sections of terminal-session.svg in sync with live repo data:
#   - Project rows (top-6 non-fork repos by push date)
#   - Stack chips (aggregated languages across all repos)
# Snake + activity handled by their own workflows.

on:
  schedule:
    - cron: "30 */6 * * *"     # every 6h
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/generate_terminal_svg.py"
      - ".github/workflows/profile-sections.yml"

permissions:
  contents: write

concurrency:
  group: profile-readme
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate terminal SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_terminal_svg.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add terminal-session.svg
          git pull --rebase --autostash origin main || true
          if [ -n "$(git status --porcelain terminal-session.svg)" ]; then
            git commit -m "chore(profile): regenerate terminal SVG"
            git push
          else
            echo "No changes after pull — already up to date."
          fi
