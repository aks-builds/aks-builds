name: Update npm Packages

on:
  schedule:
    - cron: "0 */12 * * *"   # refreshes every 12 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch npm packages and update README
        run: node .github/scripts/update-npm-packages.js
        env:
          NPM_USERNAME: aks-builds   # change if your npm username differs from GitHub

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m ":package: Update npm packages"
          git push
